name = "tradefxbook-api"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────────────────────────
# D1 Database
# After running: npx wrangler d1 create tradefxbook-db
# paste the returned `database_id` below.
# ─────────────────────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "tradefxbook-db"
database_id = "54401825-105b-4c83-b9d4-ec57b0b53ea7"

# ─────────────────────────────────────────────────────────────────────────────
# R2 Bucket (screenshots storage)
# After running: npx wrangler r2 bucket create tradefxbook-screenshots
# the bucket is ready — no ID needed, just the name below.
# ─────────────────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "TRADE_SCREENSHOTS"
bucket_name = "tradefxbook-screenshots"

# ─────────────────────────────────────────────────────────────────────────────
# Environment Variables (secrets go via: npx wrangler secret put JWT_SECRET)
# ─────────────────────────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://tradefxbook-clone-six.vercel.app"

# For local development override:
[dev]
port = 8787

# ─────────────────────────────────────────────────────────────────────────────
# AI Binding
# ─────────────────────────────────────────────────────────────────────────────
[ai]
binding = "AI"
